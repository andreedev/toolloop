<div class="grid grid-cols-12 grid-rows-1 h-dvh w-dhw">
    <div class="hidden md:flex flex-col col-span-5 bg-gradient-1 items-center justify-center">
        <div class="w-2/3 flex flex-col justify-center text-white gap-7">

           <full-logo></full-logo>
            <p class="self-center text-center">Bienvenido de vuelta. Tu comunidad te espera.</p>
            <div class="grid grid-cols-1 lg:grid-cols-2 justify-between items-center text-center text-3xl gap-6  ">
                <div class="p-4 bg-white/20 rounded-lg">🔧</div>
                <div class="p-4 bg-white/20 rounded-lg">🌿</div>
                <div class="p-4 bg-white/20 rounded-lg">🏘️</div>
                <div class="p-4 bg-white/20 rounded-lg">⭐</div>
            </div>
        </div>

    </div>
    <div class="col-span-12 md:col-span-7 flex flex-col p-5">
        <div class="flex flex-row gap-2 text-sm text-gray-500 cursor-pointer mb-5" routerLink="/">
            <fa-icon [icon]="faArrowLeft" class="" routerLink="/"></fa-icon>
            <span>Volver</span>
        </div>
        <div class="flex  self-center flex-col w-full md:w-3/4 xl:w-2/3">
            <h1 class="text-4xl font-bold mt-30">Iniciar sesión</h1>
            <p class="text-gray-500 mt-2 mb-10">¿Aún no tienes una cuenta? <a routerLink="/auth/signup" class="text-green-700 font-semibold" routerLink="/auth/signup">Regístrate</a></p>
        </div>
    </div>
</div>
