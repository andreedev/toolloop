<div class="grid grid-cols-12 grid-rows-1 h-dvh w-dhw">
    <div class="hidden md:flex flex-col col-span-5 bg-gradient-1 items-center justify-center">
        <div class="w-2/3 flex flex-col justify-center text-white gap-7">
            
            <div class="flex items-center gap-2 text-center self-center">
                <img src="/img/logo.svg" alt="Logo" class="w-14 cursor-pointer" routerLink="/">
                <div class="text-3xl">
                    <span class="font-extrabold text-green-600">Tool</span>
                    <span class="font-extrabold text-cyan-500">Loop</span>
                </div>
            </div>
            <p class="self-center text-center">Únete a tu comunidad de herramientas. Juntos somos más.</p>
            <div class="text-[14px] flex flex-col gap-3">
                <div class="flex flex-row gap-2">
                    <fa-icon [icon]="faCheckCircle" class="text-green-500"></fa-icon>
                    <span>Registro en menos de 2 minutos.</span>
                </div>
                <div class="flex flex-row gap-2">
                    <fa-icon [icon]="faCheckCircle" class="text-green-500"></fa-icon>
                    <span>Sin cuotas, sin complicaciones</span>
                </div>
                <div class="flex flex-row gap-2">
                    <fa-icon [icon]="faCheckCircle" class="text-green-500"></fa-icon>
                    <span>Comunidad verificada</span>
                </div>
                <div class="flex flex-row gap-2">
                    <fa-icon [icon]="faCheckCircle" class="text-green-500"></fa-icon>
                    <span>Pago en mano, 100% seguro</span>
                </div>
            </div>
        </div>

    </div>
    <div class="col-span-12 md:col-span-7 flex flex-col p-5">
        <div class="flex flex-row gap-2 text-sm text-gray-500 cursor-pointer mb-5" routerLink="/">
            <fa-icon [icon]="faArrowLeft" class="" routerLink="/"></fa-icon>
            <span>Volver</span>
        </div>
        <div class="flex  self-center flex-col w-full md:w-3/4 xl:w-2/3">
            <p class="text-3xl">Crear cuenta</p>
            <div class="flex flex-row gap-2 text-sm text-gray-500">
                <span>¿Ya tienes una cuenta?</span>
                <span class="text-green-600 hover:underline cursor-pointer" routerLink="/login">Inicia sesión</span>
            </div>
        </div>
        <fa-icon [icon]="faUpload" class="text-gray-400 self-center mt-10"></fa-icon>
    </div>
</div>
